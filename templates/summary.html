<!DOCTYPE html>
<html>
<head>
    <title>Session Summary</title>

    <style>
        body {
            font-family: Arial;
            background: #121212;
            color: white;
            text-align: center;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,255,150,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        li {
            list-style: none;
            margin: 10px 0;
            font-size: 18px;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #00ffcc;
            cursor: pointer;
        }

        button:hover {
            background: #00ccaa;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📊 Session Summary</h2>

    <ul>
        <li>😊 Happy: {{ data['Happy'] }}</li>
        <li>😢 Sad: {{ data['Sad'] }}</li>
        <li>😐 Neutral: {{ data['Neutral'] }}</li>
        <li>😰 Stressed: {{ data['Stressed'] }}</li>
        <li>😡 Angry: {{ data['Angry'] }}</li>
    </ul>

    <a href="/">
        <button>⬅ Back</button>
    </a>

    <a href="/reset">
        <button>🔄 Reset Session</button>
    </a>
</div>

</body>
</html>
